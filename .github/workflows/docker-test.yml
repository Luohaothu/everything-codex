name: Docker Integration Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      test_layer:
        description: Test layer to run
        required: false
        default: all
        type: choice
        options:
          - all
          - static
          - lifecycle
          - smoke
          - integration

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  baseline:
    # Fork PRs cannot access repository secrets, so we run baseline (static + lifecycle) only.
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p tests/docker/reports

      - name: Build test container
        run: docker compose -f tests/docker/docker-compose.yml build --build-arg TESTUSER_UID=$(id -u) --build-arg TESTUSER_GID=$(id -g)

      - name: Run baseline tests (static + lifecycle)
        run: docker compose -f tests/docker/docker-compose.yml run --rm test-runner lifecycle
        env:
          CODEX_TEST_MODEL: ${{ vars.CODEX_TEST_MODEL || 'gpt-5.3-codex' }}
          CODEX_TEST_REASONING_EFFORT: ${{ vars.CODEX_TEST_REASONING_EFFORT || 'medium' }}
          CODEX_TEST_TIMEOUT: ${{ vars.CODEX_TEST_TIMEOUT || '180' }}

      - name: Upload baseline test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-test-reports
          path: tests/docker/reports/

  smoke:
    # Same-repo PRs can access secrets; for safety, we still fall back to lifecycle when secrets are absent.
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p tests/docker/reports

      - name: Build test container
        run: docker compose -f tests/docker/docker-compose.yml build --build-arg TESTUSER_UID=$(id -u) --build-arg TESTUSER_GID=$(id -g)

      - name: Select smoke test layer
        id: smoke-layer
        shell: bash
        run: |
          set +e
          docker compose -f tests/docker/docker-compose.yml run --rm --entrypoint node test-runner /workspace/tests/docker/check-api-credentials.js
          status=$?
          set -e

          case "$status" in
            0)
              echo "API preflight succeeded. Running smoke suite (static + lifecycle + smoke integration)."
              echo "layer=smoke" >> "$GITHUB_OUTPUT"
              ;;
            10)
              echo "::warning::API secrets are absent for this run. Falling back to lifecycle baseline."
              echo "layer=lifecycle" >> "$GITHUB_OUTPUT"
              ;;
            20)
              echo "::warning::API credentials were rejected during preflight. Falling back to lifecycle baseline. Rotate CODEX_API_KEY or OPENAI_API_KEY."
              echo "layer=lifecycle" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::API preflight failed unexpectedly with exit code $status."
              exit "$status"
              ;;
          esac
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          CODEX_TEST_MODEL: ${{ vars.CODEX_TEST_MODEL || 'gpt-5.3-codex' }}
          CODEX_TEST_REASONING_EFFORT: ${{ vars.CODEX_TEST_REASONING_EFFORT || 'medium' }}
          CODEX_TEST_TIMEOUT: ${{ vars.CODEX_TEST_TIMEOUT || '180' }}

      - name: Run selected smoke test layer
        run: docker compose -f tests/docker/docker-compose.yml run --rm test-runner ${{ steps.smoke-layer.outputs.layer }}
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          CODEX_TEST_MODEL: ${{ vars.CODEX_TEST_MODEL || 'gpt-5.3-codex' }}
          CODEX_TEST_REASONING_EFFORT: ${{ vars.CODEX_TEST_REASONING_EFFORT || 'medium' }}
          CODEX_TEST_TIMEOUT: ${{ vars.CODEX_TEST_TIMEOUT || '180' }}

      - name: Upload smoke test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-reports
          path: tests/docker/reports/

  full:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p tests/docker/reports

      - name: Build test container
        run: docker compose -f tests/docker/docker-compose.yml build --build-arg TESTUSER_UID=$(id -u) --build-arg TESTUSER_GID=$(id -g)

      - name: Select full test layer
        id: full-layer
        shell: bash
        run: |
          requested_layer="${{ inputs.test_layer || 'all' }}"

          case "$requested_layer" in
            static|layer1|layer1/static|lifecycle|layer2|layer2/lifecycle)
              echo "Requested layer '$requested_layer' does not require API preflight."
              echo "layer=$requested_layer" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          set +e
          docker compose -f tests/docker/docker-compose.yml run --rm --entrypoint node test-runner /workspace/tests/docker/check-api-credentials.js
          status=$?
          set -e

          case "$status" in
            0)
              echo "API preflight succeeded. Running requested layer '$requested_layer'."
              echo "layer=$requested_layer" >> "$GITHUB_OUTPUT"
              ;;
            10)
              echo "::warning::API secrets are absent for this run. Falling back to lifecycle baseline."
              echo "layer=lifecycle" >> "$GITHUB_OUTPUT"
              ;;
            20)
              echo "::warning::API credentials were rejected during preflight. Falling back to lifecycle baseline. Rotate CODEX_API_KEY or OPENAI_API_KEY."
              echo "layer=lifecycle" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::API preflight failed unexpectedly with exit code $status."
              exit "$status"
              ;;
          esac
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          CODEX_TEST_MODEL: ${{ vars.CODEX_TEST_MODEL || 'gpt-5.3-codex' }}
          CODEX_TEST_REASONING_EFFORT: ${{ vars.CODEX_TEST_REASONING_EFFORT || 'medium' }}
          CODEX_TEST_TIMEOUT: ${{ vars.CODEX_TEST_TIMEOUT || '180' }}

      - name: Run selected full test layer
        run: docker compose -f tests/docker/docker-compose.yml run --rm test-runner ${{ steps.full-layer.outputs.layer }}
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          CODEX_TEST_MODEL: ${{ vars.CODEX_TEST_MODEL || 'gpt-5.3-codex' }}
          CODEX_TEST_REASONING_EFFORT: ${{ vars.CODEX_TEST_REASONING_EFFORT || 'medium' }}
          CODEX_TEST_TIMEOUT: ${{ vars.CODEX_TEST_TIMEOUT || '180' }}

      - name: Upload full test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-test-reports
          path: tests/docker/reports/
